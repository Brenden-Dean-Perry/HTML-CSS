<!DOCTYPE HTML> <!--Declares the document type and version of HTML -->
<html lang="en"> <!--Declares the language of the HTML document and established the root element. -->

<head>
    <meta charset="UTF-8"> <!--Declares the character encoding for the HTML document -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a HTML demo project to showcase basic HTML structure and styling.">
    <link rel="icon" href="img\example.png" type="image/x-icon"> <!--Links an icon to be displayed in the browser tab -->
    <link rel="stylesheet" href="css\main.css"> <!--Linking an external CSS file to style the HTML document. -->
    <title>HTML Demo Project</title> <!--Sets the title of the HTML document, which appears in the browser tab. -->
</head>

<body style="height:1000px; padding-left: 100px; padding-top: 100px;">

    <div id="header" style="background-color: black; height: 100px; position: fixed; top: 0; right: 0; left: 0; border-bottom: 1px solid white;">
        Header with fixed position
    </div>

    <div id="sidebar" style="background-color: lightblue; width: 100px; position: fixed; top: 100px; left: 0; bottom: 0; border-right: 1px solid white;">
        Sidebar with fixed position
    </div>

    <div id="content">
        <p>
            This is a div with static position. It will be positioned according to the normal flow of the document, which means it will be placed below the fixed header and to the right of the fixed sidebar.
        </p>
    </div>

</body>
</html>
