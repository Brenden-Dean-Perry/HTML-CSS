<!DOCTYPE HTML> <!--Declares the document type and version of HTML -->
<html lang="en"> <!--Declares the language of the HTML document and established the root element. -->

<head>
    <meta charset="UTF-8"> <!--Declares the character encoding for the HTML document -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a HTML demo project to showcase basic HTML structure and styling.">
    <link rel="icon" href="img\example.png" type="image/x-icon"> <!--Links an icon to be displayed in the browser tab -->
    <link rel="stylesheet" href="css\main.css"> <!--Linking an external CSS file to style the HTML document. -->
    <title>HTML Demo Project</title> <!--Sets the title of the HTML document, which appears in the browser tab. -->
</head>

<body>
    <h1>Scripting Demo</h1>
    <button onclick="runScript()">Click Me</button>
<script>
    function runScript() {
        let x = 2;
        let result = x * 2;
        alert("Solving 2 + 2... The result is " + result.toString()); 
    }
</script>
</body>
</html>
