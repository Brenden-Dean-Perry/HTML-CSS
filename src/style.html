<!DOCTYPE HTML> <!--Declares the document type and version of HTML -->
<html lang="en"> <!--Declares the language of the HTML document and established the root element. -->

<head>
    <meta charset="UTF-8"> <!--Declares the character encoding for the HTML document -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a HTML demo project to showcase basic HTML structure and styling.">
    <link rel="icon" href="img\example.png" type="image/x-icon"> <!--Links an icon to be displayed in the browser tab -->
    <link rel="stylesheet" href="css\main.css"> <!--Linking an external CSS file to style the HTML document. -->
    <title>
        HTML Demo Project
    </title> <!--Sets the title of the HTML document, which appears in the browser tab. -->
</head>

<body>
    <!--Defines the style for all p elements in the document. -->
    <!--Defines a paragraph element with the class 'important' and applies specific styles to it. -->
    <style>
        
        p { 
            border: dotted
        }
        .important{
            color: red
        }

        .tweet-button {
            color: white;
            background-color: blue;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            height: 40px;
            width: 100px;
            border-radius: 20px;
            transition: background-color 0.3s ease;
        }
            .tweet-button:hover {
                background-color: lightblue;
            }

        .shadow-button {
            color: white;
            background-color: green;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            height: 40px;
            width: 100px;
            border-radius: 20px;
            transition: box-shadow 0.3s ease;
        }
            .shadow-button:hover {
                box-shadow: 0 10px 16px white;
            }
    </style>

    <h1>HTML Styling</h1>

    <p>
        The style tags enables us to write file-specific CSS directly within the HTML document.
    </p>

    <p>
        We demonstrate the use of styling on elements with class(ification) attribute set to a value which we then style.
    </p>

    <p class="important">
        This is important!
    </p>

    <button class="tweet-button" onclick="alert('You clicked the button!')">Tweet</button>
    <!--Defines a button element that triggers a JavaScript alert when clicked. -->

    
    <button class="shadow-button" onclick="alert('You clicked the button!')">Hover</button>
    <!--Defines a button element that triggers a JavaScript alert when clicked. -->

</body>
</html>
